[custom]
enable_rule_generator=true
overwrite_original_rules=true

custom_proxy_group=Proxy`select`[]JMS Auto`^(?!.*流量).*$
custom_proxy_group=Strict`select`[]Proxy`[]JMS Auto`^(?!.*流量).*$
custom_proxy_group=Unmatched`select`[]Proxy`[]DIRECT
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Reject`select`[]REJECT`[]DIRECT
custom_proxy_group=JMS Auto`url-test`(?i)JMS`http://www.gstatic.com/generate_204`300,,50

ruleset=Reject,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt
ruleset=Strict,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=Strict,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=Direct,clash-ipcidr:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
ruleset=Direct,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
ruleset=Direct,clash-ipcidr:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
ruleset=Direct,clash-ipcidr:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt
ruleset=Direct,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt
ruleset=Direct,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt
ruleset=Direct,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt
ruleset=Proxy,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt
ruleset=Proxy,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
ruleset=Direct,[]GEOIP,CN
ruleset=Unmatched,[]FINAL

rename=JMS-\d+@JMS
rename=c3s1@US-01
rename=c3s2@US-02
rename=c3s3@US-03
rename=c3s4@JP-01
rename=c3s5@NL-01
rename=c3s801@US-801
rename=\.portablesubmarines\.com:\d+@
